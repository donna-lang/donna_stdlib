name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools and QBE
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git make
          git clone --depth 1 https://github.com/donna-lang/donna .donna-tools/compiler
          make -C .donna-tools/compiler install-qbe
          qbe --version || true

      - name: Download Donna main binary
        uses: dawidd6/action-download-artifact@v6
        with:
          repo: donna-lang/donna
          workflow: test.yml
          branch: main
          name: donna-main-linux-x86_64
          path: .donna-main-bin

      - name: Install Donna
        run: |
          chmod +x .donna-main-bin/donna
          echo "$GITHUB_WORKSPACE/.donna-main-bin" >> "$GITHUB_PATH"

      - name: Format
        run: |
          donna format
          git diff --exit-code

      - name: Build
        run: donna build

      - name: Test
        run: donna test
