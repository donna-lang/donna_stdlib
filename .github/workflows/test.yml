name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Donna tools
        uses: actions/checkout@v4
        with:
          repository: donna-lang/donna
          path: .donna-tools/compiler

      - name: Install build tools and QBE
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential git make
          make -C .donna-tools/compiler install-qbe
          qbe --version || true

      - name: Build Donna
        shell: bash
        run: |
          set -euo pipefail
          make -C .donna-tools/compiler build
          echo "$GITHUB_WORKSPACE/.donna-tools/compiler/build/bin" >> "$GITHUB_PATH"

      - name: Format
        run: |
          donna format
          git diff --exit-code

      - name: Build
        run: donna build

      - name: Test
        run: donna test
